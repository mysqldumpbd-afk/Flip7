// ── DEMO MODE: in-memory store (sin Firebase) ───────────────
const _demoStore = {};
const _demoListeners = {};

function demoSet(path, data){
  _demoStore[path] = JSON.parse(JSON.stringify(data));
  if(_demoListeners[path]) _demoListeners[path].forEach(cb=>cb(_demoStore[path]));
  return Promise.resolve();
}
function demoGet(path){ return Promise.resolve(_demoStore[path]||null); }
function demoUpdate(path, data){
  _demoStore[path] = Object.assign(_demoStore[path]||{}, JSON.parse(JSON.stringify(data)));
  if(_demoListeners[path]) _demoListeners[path].forEach(cb=>cb(_demoStore[path]));
  return Promise.resolve();
}
function demoListen(path, cb){
  if(!_demoListeners[path]) _demoListeners[path]=[];
  _demoListeners[path].push(cb);
  if(_demoStore[path]) cb(_demoStore[path]);
  return ()=>{ _demoListeners[path]=_demoListeners[path].filter(f=>f!==cb); };
}

const fmtDate = ts=>new Date(ts).toLocaleDateString("es-MX",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});

/* ── DB adapter: real or demo ──────────────── */
function makeDB(demo){
  if(demo) return {
    set:(path,data)=>demoSet(path,data),
    get:(path)=>demoGet(path),
    update:(path,data)=>demoUpdate(path,data),
    listen:(path,cb)=>demoListen(path,cb),
  };
  return {
    set:(path,data)=>_db.ref(path).set(data),
    get:(path)=>_db.ref(path).once("value").then(s=>s.val()),
    update:(path,data)=>_db.ref(path).update(data),
    listen:(path,cb)=>{ const ref=_db.ref(path); ref.on("value",s=>cb(s.val())); return ()=>ref.off("value"); },
  };
}

/* ── Error classifier ──────────────────────── */
function classifyError(e){
  const m = String(e?.message||e);
  const steps = [];
  if(!navigator.onLine){
    return {msg:"📵 Sin conexión a internet.", steps:["Verifica tu WiFi o datos móviles","Recarga la página al tener conexión"]};
  }
  if(m.includes("PERMISSION_DENIED")||m.includes("permission")){
    return {msg:"🔒 Sin permisos en Firebase.", steps:['Ve a Firebase Console → Realtime Database → Reglas','Pon: ".read": true, ".write": true','Haz clic en Publicar']};
  }
  if(m.includes("databaseURL")||m.includes("database")){
    return {msg:"⚙️ Realtime Database no configurado.", steps:["Ve a Firebase Console → Realtime Database","Crea la base de datos en modo prueba","Verifica que la URL sea: https://flip7-e364b-default-rtdb.firebaseio.com"]};
  }
  if(m.includes("fetch")||m.includes("network")||m.includes("Network")){
    return {msg:"🌐 Error de red al conectar con Firebase.", steps:["Verifica tu conexión a internet","Intenta de nuevo en unos segundos","Si persiste, revisa si Firebase está activo en status.firebase.google.com"]};
  }
  if(m.includes("unavailable")){
    return {msg:"⏳ Firebase temporalmente no disponible.", steps:["Espera unos segundos e intenta de nuevo"]};
  }
  return {msg:`⚠️ Error: ${m.slice(0,100)}`, steps:["Recarga la página e intenta de nuevo","Si persiste, revisa la consola del navegador (F12)"]};
}

  const [room,    setRoom]    = useState(null);
  const [roomCode,setRoomCode]= useState("");
  const [sessions,setSessions]= useState(()=>{ try{return JSON.parse(localStorage.getItem("f7sess")||"[]")}catch{return []} });
  const [tab,     setTab]     = useState("round");
  const [winner,  setWinner]  = useState(null);
  const winnerShown = useRef(false);
  const unsubRef    = useRef(null);
  const dbRef       = useRef(makeDB(false));

  function subscribe(code, db){
    if(unsubRef.current) unsubRef.current();
    unsubRef.current = db.listen(`rooms/${code}`, data=>{
      if(!data) return;
      setRoom(data);
      if(data.finished && data.winner && !winnerShown.current){
        winnerShown.current=true;
        setWinner(data.winner);
        addSession(data);
      }
    });
  }

  function addSession(data){
    setSessions(prev=>{
      if(prev.find(s=>s.code===data.code&&s.date===data.createdAt)) return prev;
      const s=[{id:uid(),date:data.createdAt||Date.now(),players:data.players,rounds:data.round,winner:data.winner.name,code:data.code,demo:demoMode},...prev].slice(0,20);
      try{localStorage.setItem("f7sess",JSON.stringify(s))}catch{}
      return s;
    });
  }

  function leaveGame(){
    if(unsubRef.current){unsubRef.current();unsubRef.current=null;}
    winnerShown.current=false;
    setRoom(null);setRoomCode("");setWinner(null);setScreen("home");setDemoMode(false);
  }

  async function submitScore(pid,score,method){
    const db=dbRef.current;
    const current = room?.roundScores || {};
    await db.set(`rooms/${roomCode}`,{...room,roundScores:{...current,[pid]:{score,method}}});
  }

  async function undoScore(pid){
    const db=dbRef.current;
    const newScores={...room?.roundScores};
    delete newScores[pid];
    await db.set(`rooms/${roomCode}`,{...room,roundScores:newScores});
  }

  async function finalizeRound(){
    if(!room) return;
    const db=dbRef.current;
    const newPlayers=room.players.map(p=>{
      const e=room.roundScores?.[p.id]; const pts=e?e.score:0;
      return{...p,total:p.total+pts,rounds:[...(p.rounds||[]),{score:pts,method:e?.method||"zero"}]};
    });
    const champ=newPlayers.find(p=>p.total>=WIN);
    await db.set(`rooms/${roomCode}`,{...room,players:newPlayers,roundScores:{},round:champ?room.round:room.round+1,finished:!!champ,winner:champ||null});
  }

  /* ── Start game (real or demo) ── */
  async function startGame(names, demo){
    const db = makeDB(demo);
    dbRef.current = db;
    const code = demo ? "DEMO" : uid4();
    const data = {
      code, round:1, roundScores:{}, finished:false, winner:null, createdAt:Date.now(),
      players: names.map((name,i)=>({id:uid(),name:name.trim(),emoji:EMOJIS[i%EMOJIS.length],color:COLORS[i%COLORS.length],total:0,rounds:[]}))
    };
    await db.set(`rooms/${code}`, data);
    setDemoMode(demo);
    setRoomCode(code);
    subscribe(code, db);
    setScreen("game");
    setTab("round");
    winnerShown.current=false;
  }

  async function joinGame(code, demo){
    const db = makeDB(demo);
    dbRef.current = db;
    const upperCode = code.toUpperCase();
    setDemoMode(demo);
    setRoomCode(upperCode);
    subscribe(upperCode, db);
    setScreen("game");
    setTab("round");
    winnerShown.current=false;
  }

  const allDone = room && room.players.every(p=>room.roundScores?.[p.id]!==undefined);
  const sorted  = room ? [...room.players].sort((a,b)=>b.total-a.total) : [];

  if(screen==="home")      return <HomeScreen onStart={startGame} onJoin={joinGame} sessions={sessions} dbRef={dbRef}/>;
  if(screen==="spectator") return <SpectatorScreen room={room} sorted={sorted} roomCode={roomCode} demoMode={demoMode} onBack={leaveGame}/>;

  return (
    <div className="wrap">
      <div className="hdr">
        <div>
          <div style={{display:"flex",alignItems:"baseline",gap:5}}>
            <span className="logo-f">FLIP</span><span className="logo-7">7</span>
          </div>
          <span className="logo-sub">Race to 200!</span>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <div className={`badge ${demoMode?"demo":""}`}>
            <span className={`dot ${demoMode?"demo":""}`}/>
            {demoMode?"MODO DEMO":(`SALA: ${roomCode}`)}
          </div>
          <button className="btn btn-g btn-sm" onClick={leaveGame}>✕</button>
        </div>
      </div>
      <div className="nav">
        {[["round","🃏 Ronda"],["scores","🏆 Tabla"],["history","📋 Sesiones"]].map(([id,lbl])=>(
          <button key={id} className={`nb ${tab===id?"on":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>
      <div className="page">
        {demoMode && tab==="round" && (
          <div className="demo-banner">🧪 <span>MODO DEMO — Solo tú ves estos datos, nada se guarda en Firebase</span></div>
        )}
        {tab==="round" && !room && <div style={{textAlign:"center",paddingTop:60}}><div className="spin" style={{margin:"0 auto 16px"}}/><p style={{color:"rgba(255,255,255,.4)",fontWeight:700}}>Conectando…</p></div>}
        {tab==="round" && room && <RoundTab room={room} allDone={allDone} onSubmit={submitScore} onUndo={undoScore} onFinalize={finalizeRound} demoMode={demoMode}/>}
        {tab==="scores"  && room && <ScoreTab sorted={sorted} room={room}/>}
        {tab==="history" && <HistoryTab sessions={sessions}/>}
      </div>
      {winner && <WinnerScreen winner={winner} onClose={()=>{setWinner(null);setTab("scores");}} onNew={leaveGame}/>}
    </div>
  );
}

/* ════ SCAN MODAL ════ */
function ScanModal({ playerName, onResult, onClose }){
  const [phase,setPhase]=useState("pick");
  const [img,setImg]=useState(null);
  const [b64,setB64]=useState(null);
  const [mime,setMime]=useState("image/jpeg");
  const [res,setRes]=useState(null);
  const [errMsg,setErrMsg]=useState("");
  const fileRef=useRef();

  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{const d=ev.target.result;setImg(d);setB64(d.split(",")[1]);setMime(d.split(";")[0].split(":")[1]||"image/jpeg");setPhase("preview");};
    r.readAsDataURL(f);
  }

  async function analyze(){
    setPhase("analyzing");
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},
        {type:"text",text:`Esta es una foto de las cartas del juego Flip 7 de un jugador. Suma ÚNICAMENTE los números visibles. Cartas del 0 al 12. Cartas de acción (Flip,Freeze,Second Chance) NO suman. Cartas con "+N" como "+8" SÍ suman ese número. Responde SOLO con JSON sin markdown: {"total":<número>,"cards":[<lista>],"note":"<nota breve en español>"}`}
      ]}]})});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const data=await resp.json();
      const txt=data.content?.map(c=>c.text||"").join("")||"";
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setRes(parsed);setPhase("result");
    }catch(e){setErrMsg(`No pude leer las cartas. ${e.message||""}. Usa captura manual.`);setPhase("error");}
  }

  function retake(){setImg(null);setB64(null);setRes(null);setPhase("pick");if(fileRef.current)fileRef.current.value="";}

  return (
    <div className="mbg"><div className="ms">
      <div className="mh"/>
      <div className="mt2">📷 Escanear Cartas</div>
      <div className="msub">Turno de: <b style={{color:"#fff"}}>{playerName}</b></div>
      {phase==="pick"&&(<>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
        <div className="ce" onClick={()=>fileRef.current?.click()}>
          <div style={{fontSize:"2.8rem"}}>📸</div><div>Toca para abrir la cámara</div>
          <div style={{fontSize:".72rem",opacity:.55}}>Apunta a tus cartas y toma la foto</div>
        </div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,.35)",fontSize:".78rem",fontWeight:700,cursor:"pointer",marginBottom:14}}
          onClick={()=>{if(fileRef.current){fileRef.current.removeAttribute("capture");fileRef.current.click();setTimeout(()=>fileRef.current?.setAttribute("capture","environment"),600);}}}>
          o elegir de galería</p>
        <div className="mr2"><button className="mc" onClick={onClose}>Cancelar</button></div>
      </>)}
      {phase==="preview"&&(<>
        <div className="cv"><img src={img} alt="preview"/></div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,.45)",fontWeight:700,fontSize:".83rem",marginBottom:11}}>¿Se ven bien todas las cartas?</p>
        <div className="mr2"><button className="mc" onClick={retake}>🔄 Otra foto</button><button className="mo" onClick={analyze}>🔍 Analizar</button></div>
      </>)}
      {phase==="analyzing"&&(
        <div className="cv" style={{position:"relative"}}>
          <img src={img} alt="" style={{opacity:.4,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
          <div className="sov"><div className="spin"/><div style={{fontFamily:"'Lilita One',sans-serif",color:"var(--y)",fontSize:"1.05rem"}}>Analizando cartas…</div></div>
        </div>
      )}
      {phase==="result"&&res&&(<>
        <div style={{textAlign:"center",padding:"14px 0 6px"}}>
          <div style={{fontFamily:"'Righteous',sans-serif",fontSize:".7rem",color:"rgba(255,255,255,.38)",letterSpacing:3,marginBottom:5}}>TOTAL CALCULADO</div>
          <div style={{fontFamily:"'Anton',sans-serif",fontSize:"5.5rem",color:"var(--y)",lineHeight:1,textShadow:"4px 4px 0 var(--or)"}}>{res.total}</div>
          <div style={{color:"rgba(255,255,255,.42)",fontWeight:700,fontSize:".83rem",marginTop:7}}>Cartas: {res.cards?.join(" + ")||"—"}</div>
          {res.note&&<div style={{color:"rgba(255,255,255,.28)",fontSize:".75rem",marginTop:5,fontWeight:700}}>{res.note}</div>}
        </div>
        <div className="mr2"><button className="mc" onClick={retake}>🔄 Repetir</button><button className="mo" onClick={()=>onResult(res.total)}>✅ Confirmar {res.total} pts</button></div>
      </>)}
      {phase==="error"&&(<>
        <div style={{textAlign:"center",padding:"22px 0"}}><div style={{fontSize:"2.8rem",marginBottom:11}}>⚠️</div><p style={{fontWeight:800,marginBottom:7}}>{errMsg}</p></div>
        <div className="mr2"><button className="mc" onClick={onClose}>Cerrar</button><button className="mo" onClick={retake}>🔄 Reintentar</button></div>
      </>)}
    </div></div>
  );
}

/* ════ MANUAL ════ */
function ManualModal({ playerName, onSubmit, onClose }){
  const [val,setVal]=useState("");
  function press(d){if(d==="⌫"){setVal(v=>v.slice(0,-1));return;}if(val.length>=3)return;setVal(v=>v+d);}
  return (
    <div className="mbg"><div className="ms">
      <div className="mh"/>
      <div className="mt2">✏️ Captura Manual</div>
      <div className="msub">Puntos de <b style={{color:"#fff"}}>{playerName}</b> esta ronda</div>
      <div className="nd">{val||"0"}</div>
      <div className="np">
        {["1","2","3","4","5","6","7","8","9","⌫","0"].map((d,i)=>(
          <button key={i} className={`npb ${d==="⌫"?"d":""} ${d==="0"?"z":""}`} onClick={()=>press(d)}>{d}</button>
        ))}
        <button className="npb w" onClick={()=>onSubmit(parseInt(val)||0)}>✓ OK</button>
      </div>
      <button className="mc" style={{width:"100%"}} onClick={onClose}>Cancelar</button>
    </div></div>
  );
}

/* ════ WINNER ════ */
function WinnerScreen({ winner, onClose, onNew }){
  const dots=Array.from({length:38},(_,i)=>({id:i,c:CONF[i%CONF.length],l:`${Math.random()*100}%`,dl:`${Math.random()*2.5}s`,dr:`${2.5+Math.random()*2.5}s`,sz:`${7+Math.random()*9}px`,sh:Math.random()>.5?"2px":"50%"}));
  return (
    <div className="wb">
      {dots.map(d=><div key={d.id} style={{position:"absolute",background:d.c,width:d.sz,height:d.sz,left:d.l,top:-20,borderRadius:d.sh,animation:`cf ${d.dr} ${d.dl} linear infinite`}}/>)}
      <div className="wc">🃏</div>
      <div className="wl">¡Ganador!</div>
      <div className="wbig">FLIP 7</div>
      <div className="wnm">{winner.emoji} {winner.name}</div>
      <div className="wpt">{winner.total} PUNTOS · RACE TO 200!</div>
      <button className="btn btn-y" onClick={onNew} style={{maxWidth:270,marginBottom:10}}>🎮 NUEVO JUEGO</button>
      <button className="btn btn-g" onClick={onClose} style={{maxWidth:270}}>Ver marcador final</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
