<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0F0F1A"/>
<title>FLIP 7 — Race to 200</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Lilita+One&family=Righteous&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
#root{height:100dvh;overflow-y:auto}
:root{--y:#F5C800;--r:#E63946;--t:#2EC4B6;--dark:#0F0F1A;--or:#FF6B35;--pu:#7B2D8B;--gr:#3BB273}
body{background:var(--dark);font-family:'Nunito',sans-serif;color:#fff}
.wrap{max-width:480px;margin:0 auto;min-height:100dvh;
  background:radial-gradient(ellipse at 20% 20%,rgba(245,200,0,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(46,196,182,.07) 0%,transparent 50%),
  linear-gradient(180deg,#0F0F1A 0%,#1A1A2E 100%)}
.hdr{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(15,15,26,.98) 80%,transparent);
  border-bottom:1px solid rgba(245,200,0,.12)}
.logo-f{font-family:'Anton',sans-serif;font-size:1.9rem;color:var(--y);letter-spacing:3px;text-shadow:3px 3px 0 var(--r);line-height:1}
.logo-7{font-family:'Anton',sans-serif;font-size:2.2rem;color:var(--r);text-shadow:3px 3px 0 var(--y);line-height:1}
.logo-sub{font-family:'Righteous',sans-serif;font-size:.58rem;color:var(--t);letter-spacing:2px;text-transform:uppercase;display:block}
.badge{font-family:'Righteous',sans-serif;font-size:.68rem;color:var(--y);background:rgba(245,200,0,.12);border:1px solid rgba(245,200,0,.35);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.badge.demo{color:var(--pu);background:rgba(123,45,139,.15);border-color:rgba(123,45,139,.4)}
.badge.spec{color:var(--t);background:rgba(46,196,182,.12);border-color:rgba(46,196,182,.35)}
.nav{display:flex;gap:5px;padding:8px 14px 10px}
.nb{flex:1;border:none;border-radius:10px;font-family:'Righteous',sans-serif;font-size:.68rem;letter-spacing:1px;padding:9px 4px;cursor:pointer;transition:all .18s;text-transform:uppercase}
.nb.on{background:linear-gradient(135deg,var(--y),var(--or));color:var(--dark);box-shadow:0 4px 16px rgba(245,200,0,.35)}
.nb:not(.on){background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.page{padding:0 14px 100px}
.hero{text-align:center;padding:20px 10px 18px}
.hero-logo{font-family:'Anton',sans-serif;font-size:3.5rem;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,var(--y) 30%,var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-tag{font-family:'Righteous',sans-serif;color:var(--t);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
.inp{width:100%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);color:#fff;border-radius:12px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;outline:none;transition:border-color .2s;margin-bottom:10px;display:block}
.inp:focus{border-color:var(--y)}
.inp::placeholder{color:rgba(255,255,255,.25)}
.code-inp{text-align:center;font-family:'Anton',sans-serif;font-size:3rem;letter-spacing:10px;color:var(--y);text-transform:uppercase;padding:20px 14px}
.btn{width:100%;border:none;border-radius:14px;font-family:'Lilita One',sans-serif;font-size:1.1rem;letter-spacing:1px;padding:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;user-select:none}
.btn:active{transform:scale(.97)}
.btn-y{background:linear-gradient(135deg,var(--y),var(--or));color:var(--dark);box-shadow:0 6px 20px rgba(245,200,0,.3)}
.btn-y:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-t{background:linear-gradient(135deg,var(--t),#1A9A94);color:white}
.btn-g{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);font-size:.86rem}
.btn-g:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-demo{background:linear-gradient(135deg,var(--pu),#5A2070);color:white}
.btn-sm{padding:7px 12px;font-size:.75rem;border-radius:9px;width:auto}
.btn-add{width:100%;background:none;border:2px dashed rgba(255,255,255,.12);color:rgba(255,255,255,.38);border-radius:11px;padding:10px;cursor:pointer;font-weight:800;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:.88rem}
.btn-add:hover{border-color:var(--t);color:var(--t)}
.alert{border-radius:12px;padding:10px 14px;display:flex;align-items:flex-start;gap:9px;margin-bottom:11px;font-weight:800;font-size:.84rem}
.al-g{background:rgba(59,178,115,.13);border:1px solid rgba(59,178,115,.38);color:var(--gr)}
.al-y{background:rgba(245,200,0,.1);border:1px solid rgba(245,200,0,.3);color:var(--y)}
.al-r{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.35);color:var(--r);flex-direction:column}
.psr{display:flex;gap:7px;margin-bottom:7px;align-items:center}
.psr .inp{margin:0;flex:1}
.psr-rm{background:none;border:none;color:var(--r);font-size:1.1rem;cursor:pointer;padding:0 5px}
.pr{border-radius:14px;border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:10px;transition:all .25s;position:relative;overflow:hidden}
.pr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--clr,transparent);border-radius:4px 0 0 4px}
.pr.done{border-color:rgba(59,178,115,.45);background:rgba(59,178,115,.07)}
.pr.done::before{background:var(--gr)}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.pr-name{font-weight:900;font-size:.92rem}
.pr-pts{font-family:'Anton',sans-serif;font-size:1.7rem;color:var(--y);line-height:1}
.ar{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.ab{border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.74rem;padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;user-select:none}
.ab:active{transform:scale(.95)}
.ab-s{background:linear-gradient(135deg,var(--t),#1A9A94);color:white}
.ab-z{background:rgba(255,255,255,.09);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.13)}
.ab-m{background:rgba(245,200,0,.14);color:var(--y);border:1px solid rgba(245,200,0,.28)}
.mtag{font-family:'Righteous',sans-serif;font-size:.6rem;letter-spacing:1px;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.mt-s{background:rgba(46,196,182,.18);color:var(--t)}
.mt-z{background:rgba(255,255,255,.09);color:rgba(255,255,255,.45)}
.mt-m{background:rgba(245,200,0,.14);color:var(--y)}
.undo{background:none;border:none;color:rgba(255,255,255,.28);font-size:.8rem;cursor:pointer;padding:4px 5px}
.undo:hover{color:var(--r)}

/* SCOREBOARD */
.sg{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.sc{border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);transition:all .6s cubic-bezier(.34,1.56,.64,1)}
.sc.first{border-color:rgba(245,200,0,.55);background:linear-gradient(135deg,rgba(245,200,0,.13),rgba(255,107,53,.08))}
.sc.second{border-color:rgba(192,192,192,.35)}
.sc.third{border-color:rgba(205,127,50,.35)}
.sc-rank{font-family:'Anton',sans-serif;font-size:2.4rem;color:rgba(255,255,255,.18);line-height:1;width:40px;flex-shrink:0}
.sc.first .sc-rank{color:var(--y)}
.sc.second .sc-rank{color:#C0C0C0}
.sc.third .sc-rank{color:#CD7F32}
.sc-pts{font-family:'Anton',sans-serif;font-size:3rem;line-height:1;color:rgba(255,255,255,.5);margin-left:auto;transition:all .5s}
.sc.first .sc-pts{color:var(--y)}
.sc.second .sc-pts{color:#C0C0C0}
.sc.third .sc-pts{color:#CD7F32}
.sc-bar{position:absolute;bottom:0;left:0;height:4px;background:linear-gradient(90deg,var(--y),var(--or));transition:width 1s cubic-bezier(.4,0,.2,1)}
.sc-pct{position:absolute;bottom:6px;right:13px;font-size:.6rem;color:rgba(255,255,255,.28);font-weight:700;font-family:'Righteous',sans-serif}
.sc.moved-up{animation:slideUp .5s cubic-bezier(.34,1.56,.64,1)}
.sc.moved-down{animation:slideDown .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{0%{transform:translateY(30px);opacity:.5}100%{transform:translateY(0);opacity:1}}
@keyframes slideDown{0%{transform:translateY(-30px);opacity:.5}100%{transform:translateY(0);opacity:1}}

/* SPECTATOR */
.spec-wrap{max-width:480px;margin:0 auto;min-height:100dvh;background:radial-gradient(ellipse at 50% 0%,rgba(245,200,0,.08) 0%,transparent 60%),linear-gradient(180deg,#0A0A18 0%,#0F0F1A 100%)}
.spec-big-card{border-radius:20px;padding:16px 20px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);transition:all .7s cubic-bezier(.34,1.56,.64,1);margin-bottom:10px}
.spec-big-card.first{border-color:rgba(245,200,0,.55);background:linear-gradient(135deg,rgba(245,200,0,.12),rgba(255,107,53,.08))}
.spec-big-card.second{border-color:rgba(192,192,192,.3)}
.spec-big-card.third{border-color:rgba(205,127,50,.3)}
.sbc-rank{font-family:'Anton',sans-serif;font-size:3rem;line-height:1;width:50px;flex-shrink:0;color:rgba(255,255,255,.2)}
.spec-big-card.first .sbc-rank{color:var(--y);font-size:3.5rem}
.spec-big-card.second .sbc-rank{color:#C0C0C0}
.spec-big-card.third .sbc-rank{color:#CD7F32}
.sbc-pts{font-family:'Anton',sans-serif;font-size:4rem;line-height:1;margin-left:auto;color:rgba(255,255,255,.5)}
.spec-big-card.first .sbc-pts{font-size:5rem;color:var(--y);text-shadow:0 0 30px rgba(245,200,0,.5)}
.spec-big-card.second .sbc-pts{color:#C0C0C0}
.spec-big-card.third .sbc-pts{color:#CD7F32}
.sbc-bar{position:absolute;bottom:0;left:0;height:5px;background:linear-gradient(90deg,var(--y),var(--or));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.spec-big-card.moved-up{animation:specUp .6s cubic-bezier(.34,1.56,.64,1)}
.spec-big-card.moved-down{animation:specDown .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes specUp{0%{transform:translateY(40px) scale(.95);opacity:.4}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes specDown{0%{transform:translateY(-40px) scale(.95);opacity:.4}100%{transform:translateY(0) scale(1);opacity:1}}

/* ROUND TABLE */
.tw{overflow-x:auto;margin-bottom:18px;border-radius:13px;border:1px solid rgba(255,255,255,.07)}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:rgba(245,200,0,.1);color:var(--y);font-family:'Righteous',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:8px;text-align:center;border-bottom:1px solid rgba(245,200,0,.18);white-space:nowrap}
thead th:first-child{text-align:left;padding-left:12px}
tbody td{padding:8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05);font-weight:800;color:rgba(255,255,255,.65)}
tbody td:first-child{text-align:left;padding-left:12px;font-weight:900;color:white}
tbody tr:last-child td{border-bottom:none}
.tc{font-family:'Anton',sans-serif;font-size:1.2rem;color:var(--y)}
.lr{background:rgba(245,200,0,.06)}
.rz{color:rgba(255,255,255,.27)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px)}
.ms{background:#14162A;border-radius:26px 26px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;border-top:2px solid rgba(245,200,0,.22);max-height:94vh;overflow-y:auto}
.mh{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 auto 16px}
.mt2{font-family:'Lilita One',sans-serif;font-size:1.4rem;color:var(--y);letter-spacing:1.5px;margin-bottom:3px}
.msub{color:rgba(255,255,255,.42);font-weight:700;font-size:.83rem;margin-bottom:16px}
.mr2{display:flex;gap:9px;margin-top:12px}
.mc{flex:1;padding:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.48);border-radius:11px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.86rem}
.mo{flex:2;padding:12px;background:linear-gradient(135deg,var(--y),var(--or));border:none;color:var(--dark);border-radius:11px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;font-size:.9rem}
.cv{border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3;position:relative;margin-bottom:11px}
.cv img{width:100%;height:100%;object-fit:cover;display:block}
.sov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,15,26,.75);gap:12px}
.spin{width:50px;height:50px;border:5px solid rgba(245,200,0,.18);border-top-color:var(--y);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ce{aspect-ratio:4/3;border-radius:14px;border:2px dashed rgba(255,255,255,.13);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:11px;color:rgba(255,255,255,.32);font-weight:700;font-size:.86rem;cursor:pointer}
.ce:hover{border-color:var(--t);color:var(--t)}
.api-box{background:rgba(245,200,0,.06);border:1px solid rgba(245,200,0,.2);border-radius:12px;padding:12px;margin-bottom:12px}
.api-box p{font-size:.74rem;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:8px;line-height:1.5}

/* ═══ CALCULADORA ═══ */
.calc-display{background:rgba(0,0,0,.4);border:2px solid rgba(245,200,0,.25);border-radius:14px;padding:12px 16px;margin-bottom:12px;min-height:70px}
.calc-expr{font-family:'Righteous',sans-serif;font-size:.78rem;color:rgba(255,255,255,.45);letter-spacing:1px;min-height:18px;word-break:break-all;margin-bottom:4px}
.calc-result{font-family:'Anton',sans-serif;font-size:3.5rem;color:var(--y);line-height:1;text-align:right;text-shadow:3px 3px 0 var(--or)}
.calc-result.error{color:var(--r);font-size:1.5rem;padding-top:8px}

/* numpad 3x3 */
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.np-bottom{display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:8px}
.np-ops{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.npb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:14px;color:white;font-family:'Lilita One',sans-serif;font-size:1.35rem;padding:17px 6px;cursor:pointer;transition:all .1s;user-select:none;text-align:center;display:flex;align-items:center;justify-content:center}
.npb:hover{background:rgba(245,200,0,.2);border-color:var(--y)}
.npb:active{transform:scale(.91);background:rgba(245,200,0,.3)}
.npb.zero-key{font-size:1.35rem;padding:17px 6px}
.npb.del-key{background:rgba(230,57,70,.1);color:var(--r);border-color:rgba(230,57,70,.25)}
.npb.op-key{background:rgba(46,196,182,.1);color:var(--t);border-color:rgba(46,196,182,.25);font-size:1.5rem}
.npb.op-key:hover{background:rgba(46,196,182,.25)}
.npb.clr-key{background:rgba(230,57,70,.1);color:var(--r);border-color:rgba(230,57,70,.25);font-size:.9rem;letter-spacing:0}
.npb.ok-key{width:100%;background:linear-gradient(135deg,var(--y),var(--or));color:var(--dark);border:none;font-size:1.2rem;padding:16px;border-radius:14px;cursor:pointer;font-family:'Lilita One',sans-serif;user-select:none;display:flex;align-items:center;justify-content:center;gap:8px}
.npb.ok-key:active{transform:scale(.96)}

/* WINNER */
.wb{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#2a1800 0%,#0F0F1A 60%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;overflow:hidden;z-index:999}
.wc{font-size:4.5rem;animation:fl 2s ease-in-out infinite;margin-bottom:8px}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-16px) rotate(5deg)}}
.wl{font-family:'Righteous',sans-serif;font-size:.76rem;letter-spacing:5px;color:var(--t);text-transform:uppercase;margin-bottom:5px}
.wbig{font-family:'Anton',sans-serif;font-size:4.2rem;letter-spacing:3px;background:linear-gradient(135deg,var(--y) 30%,var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.wnm{font-family:'Lilita One',sans-serif;font-size:2.2rem;color:white;letter-spacing:1px;margin-bottom:4px}
.wpt{font-family:'Righteous',sans-serif;font-size:.9rem;color:var(--y);margin-bottom:32px;letter-spacing:2px}
@keyframes cf{0%{transform:translateY(-30px) rotate(0) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(720deg) scale(.4);opacity:0}}
.sec{font-family:'Righteous',sans-serif;font-size:.72rem;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:9px}
.div{height:1px;background:rgba(255,255,255,.07);margin:14px 0}
.rsb{display:flex;align-items:center;justify-content:space-between}
.rbd{font-family:'Lilita One',sans-serif;font-size:.8rem;background:linear-gradient(135deg,var(--pu),#5A2070);color:white;padding:4px 13px;border-radius:20px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:blink 1.4s ease-in-out infinite;display:inline-block;flex-shrink:0}
.dot.demo{background:var(--pu)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.g8{height:8px}.g12{height:12px}
.hc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:12px 14px;margin-bottom:9px}
.hw{display:flex;align-items:center;gap:8px;background:rgba(245,200,0,.09);border-radius:9px;padding:7px 11px}
.hpl{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.hpt{font-size:.73rem;font-weight:800;background:rgba(255,255,255,.05);padding:3px 9px;border-radius:20px;color:rgba(255,255,255,.55)}
.es{text-align:center;padding:36px 20px;color:rgba(255,255,255,.32)}
.demo-banner{background:rgba(123,45,139,.18);border:1px solid rgba(123,45,139,.4);border-radius:11px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:9px;font-size:.8rem;font-weight:800;color:#cc88ff}

/* PLAYER PICKER */
.player-pick{border-radius:12px;border:2px solid rgba(255,255,255,.1);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s}
.player-pick:hover{border-color:var(--y);background:rgba(245,200,0,.06)}
.player-pick:active{transform:scale(.97)}
.player-pick.selected{border-color:var(--y);background:rgba(245,200,0,.1)}

/* AI selector */
.ai-tabs{display:flex;gap:6px;margin-bottom:10px}
.ai-tab{flex:1;border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 6px;cursor:pointer;text-align:center;font-family:'Righteous',sans-serif;font-size:.68rem;letter-spacing:1px;transition:all .2s;background:none;color:rgba(255,255,255,.45)}
.ai-tab.on{border-color:var(--y);background:rgba(245,200,0,.1);color:var(--y)}
</style>

// DEMO store
const _DS={},_DL={};
function demoSet(p,d){_DS[p]=JSON.parse(JSON.stringify(d));(_DL[p]||[]).forEach(c=>c(_DS[p]));return Promise.resolve();}
function demoGet(p){return Promise.resolve(_DS[p]||null);}
function demoListen(p,cb){_DL[p]=_DL[p]||[];_DL[p].push(cb);if(_DS[p])cb(_DS[p]);return()=>{_DL[p]=_DL[p].filter(f=>f!==cb);};}

// SOUNDS
let _actx=null;
function getAC(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function beep(f=440,d=.08,t='sine',v=.3){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function snd(t){
  if(t==='tap')    beep(600,.05,'sine',.18);
  else if(t==='score'){beep(520,.08,'sine',.28);setTimeout(()=>beep(660,.1,'sine',.28),100);}
  else if(t==='round'){beep(440,.1,'square',.2);setTimeout(()=>beep(550,.1,'square',.2),120);setTimeout(()=>beep(660,.15,'square',.25),240);}
  else if(t==='winner'){[0,150,300,450].forEach((d,i)=>setTimeout(()=>beep(440+i*110,.15,'sine',.35),d));}
  else if(t==='up')   {beep(600,.06,'sine',.2);setTimeout(()=>beep(800,.1,'sine',.25),80);}
  else if(t==='down') beep(300,.12,'sine',.2);
  else if(t==='join') {beep(500,.08,'sine',.25);setTimeout(()=>beep(700,.1,'sine',.3),100);}
  else if(t==='num')  beep(700,.04,'sine',.13);
  else if(t==='zero') beep(400,.08,'triangle',.18);
  else if(t==='op')   beep(550,.06,'triangle',.2);
  else if(t==='del')  beep(300,.05,'sine',.15);
  else if(t==='fanfare'){
    // Victory fanfare melody: C-E-G-C (ascending triumphant)
    const notes=[523,659,784,1047,784,1047,1175,1047];
    const durs=[.12,.12,.12,.25,.1,.12,.12,.35];
    let t2=0;
    notes.forEach((f,i)=>{
      setTimeout(()=>beep(f,durs[i],'sine',.4),t2*1000);
      t2+=durs[i]+.04;
    });
  }
  else if(t==='victory'){
    // Full victory song - plays on winner screen
    const melody=[523,523,523,392,523,659,392,330,440,494,466,440,392,523,659,784];
    const dur=[.15,.15,.15,.2,.3,.5,.3,.2,.15,.15,.15,.15,.2,.2,.2,.5];
    let t2=0;
    melody.forEach((f,i)=>{
      setTimeout(()=>beep(f,dur[i],'sine',.35),t2*1000);
      t2+=dur[i]+.05;
    });
  }
  else if(t==='spec_join'){
    // Chime when spectator joins
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,'sine',.3),i*180));
  }
}

// Safe eval for calculator
function safeEval(expr){
  try{
    const clean=expr.replace(/[^0-9+\-*/().]/g,'');
    if(!clean)return 0;
    // eslint-disable-next-line no-new-func
    const r=Function('"use strict";return ('+clean+')')();
    return isFinite(r)?Math.round(r*100)/100:null;
  }catch{return null;}
}

<script type="text/babel">





const{useState,useEffect,useRef,useCallback}=React;

const EMOJIS=["","","","","","","","","","","","","","","","","","","","","","","",""];

const CONF=["#F5C800","#E63946","#2EC4B6","#FF6B35","#fff","#3BB273","#7B2D8B"];
const uid4=()=>Math.random().toString(36).slice(2,6).toUpperCase();
const uid=()=>Math.random().toString(36).slice(2,10);
const fmtDate=ts=>new Date(ts).toLocaleDateString("es-MX",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});

function makeDB(demo){
  if(demo)return{set:(p,d)=>demoSet(p,d),get:(p)=>demoGet(p),listen:(p,cb)=>demoListen(p,cb)};
  return{
    set:(p,d)=>_db.ref(p).set(d),
    get:(p)=>_db.ref(p).once("value").then(s=>s.val()),
    listen:(p,cb)=>{const r=_db.ref(p);r.on("value",s=>cb(s.val()));return()=>r.off("value");},
  };
}

function classifyError(e){
  const m=String(e?.message||e);
  if(!navigator.onLine)return{msg:" Sin conexi\u00F3n.",steps:["Verifica tu internet"]};
  if(m.includes("PERMISSION_DENIED"))return{msg:" Sin permisos Firebase.",steps:['Reglas  ".read":true,".write":true  Publicar']};
  if(m.includes("fetch")||m.includes("network"))return{msg:" Error de red.",steps:["Verifica conexi\u00F3n e intenta de nuevo"]};
  return{msg:" "+m.slice(0,100),steps:["Recarga la p\u00E1gina"]};
}
function App(){
  const[lang,setLang]=useState(()=>localStorage.getItem("f7lang")||"es");
  const T=LANGS[lang]||LANGS.es;
  React.useEffect(()=>localStorage.setItem("f7lang",lang),[lang]);

  const[tab,setTab]=useState("round");
  const[winner,setWinner]=useState(null);
  const[aiConfig,setAiConfig]=useState({provider:"gemini",key:""});
  const[aiLoaded,setAiLoaded]=useState(false);

  
  useEffect(()=>{
    async function loadAiConfig(){
      try{
        
        const [gemSnap, claudeSnap] = await Promise.all([
          _db.ref("config/ai").once("value"),
          _db.ref("config/claude").once("value")
        ]);
        const gemCfg    = gemSnap.val();
        const claudeCfg = claudeSnap.val();
        
        const config = {
          provider: gemCfg?.provider||"gemini",
          key:      gemCfg?.key||"",
          claudeKey: claudeCfg?.key||""
        };
        setAiConfig(config);
        setAiLoaded(true);
        return;
      }catch(e){ console.log("Firebase config not available, using local"); }
      
      try{
        const s=JSON.parse(localStorage.getItem("f7ai")||"{}");
        setAiConfig({provider:s.provider||"gemini", key:s.key||"", claudeKey:s.claudeKey||""});
      }catch{}
      setAiLoaded(true);
    }
    loadAiConfig();
  },[]);
  const winnerShown=useRef(false);
  const unsubRef=useRef(null);
  const dbRef=useRef(makeDB(false));
  const prevSortedRef=useRef([]);

  useEffect(()=>{try{localStorage.setItem("f7ai",JSON.stringify(aiConfig))}catch{};},[aiConfig]);

  function subscribe(code,db){
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=db.listen("rooms/"+code,data=>{
      if(!data)return;
      const newSorted=[...data.players].sort((a,b)=>b.total-a.total);
      const prev=prevSortedRef.current;
      newSorted.forEach((p,ni)=>{
        const oi=prev.findIndex(x=>x.id===p.id);
        if(oi!==-1&&oi!==ni){p._moved=ni<oi?'up':'down';if(ni<oi)snd('up');else snd('down');}
      });
      prevSortedRef.current=newSorted.map(p=>({...p}));
      setRoom(data);
      if(data.finished&&data.winner&&!winnerShown.current){
        winnerShown.current=true;setWinner(data.winner);snd('winner');setTimeout(()=>snd('victory'),400);
        setSessions(prev=>{
          if(prev.find(s=>s.code===data.code&&s.date===data.createdAt))return prev;
          const s=[{id:uid(),date:data.createdAt||Date.now(),players:data.players,rounds:data.round,winner:data.winner.name,code:data.code,demo:demoMode},...prev].slice(0,20);
          try{localStorage.setItem("f7sess",JSON.stringify(s))}catch{} return s;
        });
      }
    });
  }

  function leaveGame(){
    if(unsubRef.current){unsubRef.current();unsubRef.current=null;}
    winnerShown.current=false;prevSortedRef.current=[];
    setRoom(null);setRoomCode("");setWinner(null);setScreen("home");setDemoMode(false);setIsSpectator(false);setMyPlayerId(null);
  }

  async function startRematch(prevPlayers){
    snd('round');
    if(unsubRef.current){unsubRef.current();unsubRef.current=null;}
    winnerShown.current=false;prevSortedRef.current=[];
    const db=makeDB(false);dbRef.current=db;
    const code=uid4();
    
    const freshPlayers=prevPlayers.map(p=>({...p,total:0,rounds:[],roundScores:{}}));
    await db.set("rooms/"+code,{
      code,round:1,roundScores:{},finished:false,winner:null,createdAt:Date.now(),
      players:freshPlayers
    });
    setWinner(null);setDemoMode(false);
    setRoomCode(code);
    setMyPlayerId(null); 
    subscribe(code,db);
    setScreen("game");setTab("round");
  }

  async function submitScore(pid,score,method){
    snd('score');
    const cur=room?.roundScores||{};
    await dbRef.current.set("rooms/"+roomCode,{...room,roundScores:{...cur,[pid]:{score,method}}});
  }
  async function undoScore(pid){
    snd('tap');
    const ns={...room?.roundScores};delete ns[pid];
    await dbRef.current.set("rooms/"+roomCode,{...room,roundScores:ns});
  }
  async function finalizeRound(){
    snd('round');
    const newPlayers=room.players.map(p=>{
      const e=room.roundScores?.[p.id];const pts=e?e.score:0;
      return{...p,total:p.total+pts,rounds:[...(p.rounds||[]),{score:pts,method:e?.method||"zero"}]};
    });
    
    const maxScore=Math.max(...newPlayers.map(p=>p.total));
    const champs=newPlayers.filter(p=>p.total>=WIN&&p.total===maxScore);
    const isFinished=champs.length>0;
    
    const winner=champs.length===1?champs[0]:{tied:true,players:champs,total:maxScore,name:champs.map(p=>p.name).join(" & "),emoji:""};
    await dbRef.current.set("rooms/"+roomCode,{...room,players:newPlayers,roundScores:{},round:isFinished?room.round:room.round+1,finished:isFinished,winner:isFinished?winner:null});
  }

  async function enterGame({names,demo,spectator,code,playerId,customEmojis,customColors}){
    const db=makeDB(demo);dbRef.current=db;
    let roomCode2=code;
    if(!code){
      roomCode2=demo?"DEMO":uid4();
      await db.set("rooms/"+roomCode2,{
        code:roomCode2,round:1,roundScores:{},finished:false,winner:null,createdAt:Date.now(),
        players:names.map((name,i)=>({
          id:uid(),name:name.trim(),
          emoji:(customEmojis&&customEmojis[i])||EMOJIS[i%EMOJIS.length],
          color:(customColors&&customColors[i])||COLORS[i%COLORS.length],
          total:0,rounds:[]
        }))
      });
    }
    setDemoMode(demo);setRoomCode(roomCode2);setIsSpectator(spectator||false);
    setMyPlayerId(playerId||null);
    subscribe(roomCode2,db);
    setScreen("game");setTab(spectator?"scores":"round");
    winnerShown.current=false;prevSortedRef.current=[];
  }

  const allDone=room&&room.players.every(p=>room.roundScores?.[p.id]!==undefined);
  const sorted=room?[...room.players].sort((a,b)=>b.total-a.total):[];

  if(screen==="home")return<HomeScreen onEnter={enterGame} sessions={sessions} aiConfig={aiConfig} setAiConfig={setAiConfig} lang={lang} setLang={setLang} T={T}/>;
  if(isSpectator)return<SpectatorScreen room={room} sorted={sorted} roomCode={roomCode} demoMode={demoMode} onBack={leaveGame} winner={winner} T={T}/>;

    <div className="wrap">
      <div className="hdr">
        <div>
          <div style={{display:"flex",alignItems:"baseline",gap:4}}><span className="logo-f">FLIP</span><span className="logo-7">7</span></div>
          <span className="logo-sub">Race to 200!</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div className={"badge "+demoMode?"demo":""}><span className={"dot "+demoMode?"demo":""}/>{demoMode?"DEMO":T.codeLabel+": "+roomCode}</div>
          <button onClick={()=>{snd('tap');setLang(l=>l==="es"?"en":"es");}} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.6)",borderRadius:9,padding:"5px 8px",cursor:"pointer",fontFamily:"'Righteous',sans-serif",fontSize:".7rem",letterSpacing:1}}>
            {lang==="es"?"":""}
          </button>
          <button className="btn btn-g btn-sm" onClick={()=>{snd('tap');leaveGame();}}></button>
        </div>
      </div>
      <div className="nav">
        {[["round",T.round],["scores",T.table],["history",T.history]].map(([id,lbl])=>(
          <button key={id} className={"nb "+tab===id?"on":""} onClick={()=>{snd('tap');setTab(id);}}>{lbl}</button>
        ))}
      </div>
      <div className="page">
        {demoMode&&tab==="round"&&<div className="demo-banner"> <span>MODO DEMO  local, sin Firebase</span></div>}
        {tab==="round"&&!room&&<div style={{textAlign:"center",paddingTop:60}}><div className="spin" style={{margin:"0 auto 16px"}}/><p style={{color:"rgba(255,255,255,.4)",fontWeight:700}}>Conectando</p></div>}
        {tab==="round"&&room&&<RoundTab room={room} allDone={allDone} onSubmit={submitScore} onUndo={undoScore} onFinalize={finalizeRound} myPlayerId={myPlayerId} demoMode={demoMode} aiConfig={aiConfig} setAiConfig={setAiConfig} onRematch={startRematch} onEndGame={leaveGame} roomCode={roomCode} T={T}/>}
        {tab==="scores"&&room&&<ScoreTab sorted={sorted} room={room} T={T}/>}
        {tab==="history"&&<HistoryTab sessions={sessions} onClear={()=>{setSessions([]);try{localStorage.removeItem("f7sess")}catch{}}} T={T}/>}
      </div>
      {winner&&<WinnerScreen winner={winner} onClose={()=>{setWinner(null);setTab("scores");}} onNew={leaveGame} T={T}/>}
    </div>
  );
}

<script type="text/babel">





function HomeScreen({onEnter,sessions,aiConfig,setAiConfig,lang,setLang,T}){
  const[view,setView]=useState("main");
  const[names,setNames]=useState(["","",""]);
  const[playerEmojis,setPlayerEmojis]=useState(EMOJIS.slice(0,3));
  const[playerColors,setPlayerColors]=useState(COLORS.slice(0,3));
  const[jcode,setJcode]=useState("");
  const[jname,setJname]=useState("");
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState(null);
  
  const[roomPlayers,setRoomPlayers]=useState(null);
  const[pickingPlayer,setPickingPlayer]=useState(false);
  
  React.useEffect(()=>{
    setPlayerEmojis(p=>{const a=[...p];while(a.length<names.length){const next=EMOJIS.find(e=>!a.includes(e))||EMOJIS[a.length%8];a.push(next);}return a.slice(0,names.length);});
    setPlayerColors(p=>{const a=[...p];while(a.length<names.length){const next=COLORS.find(c=>!a.includes(c))||COLORS[a.length%8];a.push(next);}return a.slice(0,names.length);});
  },[names.length]);
  const go=v=>{snd('tap');setErr(null);setView(v);setRoomPlayers(null);setPickingPlayer(false);};

  async function createReal(){
    const ns=names.filter(n=>n.trim());
    if(ns.length<2){setErr({msg:"Necesitas al menos 2 jugadores.",steps:[]});return;}
    setBusy(true);setErr(null);
    try{await onEnter({names:ns,demo:false,customEmojis:playerEmojis,customColors:playerColors});}catch(e){setErr(classifyError(e));}
    setBusy(false);
  }

  async function tryJoin(asSpectator=false){
    if(jcode.length<4){setErr({msg:"C\u00F3digo de 4 caracteres.",steps:[]});return;}
    if(!asSpectator&&!jname.trim()){setErr({msg:"Ingresa tu nombre.",steps:[]});return;}
    setBusy(true);setErr(null);
    try{
      const db=makeDB(false);
      const r=await db.get("rooms/"+jcode.toUpperCase());
      if(!r){setErr({msg:"Sala \""+jcode.toUpperCase()+"\" no encontrada.",steps:["Pide el c\u00F3digo al host"]});setBusy(false);return;}

      if(asSpectator){snd('join');await onEnter({demo:false,spectator:true,code:jcode.toUpperCase()});setBusy(false);return;}

      const inputName=jname.trim().toLowerCase();
      const existing=r.players.find(p=>p.name.toLowerCase()===inputName);

      if(existing){
        
        snd('join');
        await onEnter({demo:false,spectator:false,code:jcode.toUpperCase(),playerId:existing.id});
      } else {
        
        setRoomPlayers(r.players);
        setPickingPlayer(true);
      }
    }catch(e){setErr(classifyError(e));}
    setBusy(false);
  }

  async function pickPlayer(player){
    
    snd('join');
    try{await onEnter({demo:false,spectator:false,code:jcode.toUpperCase(),playerId:player.id});}
    catch(e){setErr(classifyError(e));}
  }

  async function joinAsNew(){
    if(!jname.trim()){setErr({msg:"Ingresa tu nombre.",steps:[]});return;}
    setBusy(true);setErr(null);
    try{
      const r=await makeDB(false).get("rooms/"+jcode.toUpperCase());
      const newP={id:uid(),name:jname.trim(),emoji:EMOJIS[r.players.length%EMOJIS.length],color:COLORS[r.players.length%COLORS.length],total:0,rounds:[]};
      r.players=[...r.players,newP];
      await _db.ref("rooms/"+jcode.toUpperCase()).set(r);
      snd('join');
      await onEnter({demo:false,spectator:false,code:jcode.toUpperCase(),playerId:newP.id});
    }catch(e){setErr(classifyError(e));}
    setBusy(false);
  }

  if(view==="create")return(
    <div className="wrap"><div className="page" style={{paddingTop:24}}>
      <div className="hero"><div style={{fontSize:"2.8rem",marginBottom:6}}></div>
        <div className="hero-logo" style={{fontSize:"2.4rem"}}>{T.createRoom}</div>
        <div className="hero-tag">{T.newGame}</div>
      </div>
      <p className="sec">{T.players} (min. 2)</p>
      {names.map((n,i)=>(
        <PlayerRow key={i} idx={i}
          name={n} emoji={playerEmojis[i]||EMOJIS[i%8]} color={playerColors[i]||COLORS[i%8]}
          allEmojis={EMOJIS} allColors={COLORS}
          usedColors={playerColors.filter((_,j)=>j!==i)}
          canRemove={names.length>2}
          onName={v=>setNames(p=>p.map((x,j)=>j===i?v:x))}
          onEmoji={v=>setPlayerEmojis(p=>p.map((x,j)=>j===i?v:x))}
          onColor={v=>setPlayerColors(p=>p.map((x,j)=>j===i?v:x))}
          onRemove={()=>{snd('tap');setNames(p=>p.filter((_,j)=>j!==i));setPlayerEmojis(p=>p.filter((_,j)=>j!==i));setPlayerColors(p=>p.filter((_,j)=>j!==i));}}
        />
      ))}
      {names.length<8&&<button className="btn-add" onClick={()=>{snd('tap');setNames(p=>[...p,""]);}}>+ {T.addPlayer}</button>}
      {err&&<ErrBox err={err}/>}
      <button className="btn btn-y" onClick={()=>{snd('tap');createReal();}} disabled={busy||names.filter(n=>n.trim()).length<2}>
        {busy?T.creating:T.create}
      </button>

      <div className="g8"/><button className="btn btn-g" onClick={()=>go("main")}>{T.back}</button>
    </div></div>
  );

  if(view==="join")return(
    <div className="wrap"><div className="page" style={{paddingTop:24}}>
      <div className="hero"><div style={{fontSize:"2.8rem",marginBottom:6}}></div>
        <div className="hero-logo" style={{fontSize:"2.4rem"}}>UNIRSE</div>
        <div className="hero-tag">Codigo de sala</div>
      </div>

      {!pickingPlayer&&(<>
        <p className="sec">CODIGO DE SALA</p>
        <input className="inp code-inp" placeholder="XXXX" maxLength={4} value={jcode}
          onChange={e=>setJcode(e.target.value.toUpperCase())} onFocus={()=>snd('tap')}/>
        <p className="sec" style={{marginTop:12}}>TU NOMBRE</p>
        <input className="inp" placeholder="Tu nombre en el juego" value={jname}
          onChange={e=>setJname(e.target.value)} onFocus={()=>snd('tap')}/>
        {err&&<ErrBox err={err}/>}
        <div className="g12"/>
        <button className="btn btn-y" onClick={()=>{snd('tap');tryJoin(false);}} disabled={busy||jcode.length<4||!jname.trim()}>
          {busy?" Buscando sala":" UNIRME AL JUEGO"}
        </button>
        <div className="div"/>
        <p className="sec">SOLO VER MARCADOR</p>
        <button className="btn btn-t" onClick={()=>{snd('tap');tryJoin(true);}} disabled={busy||jcode.length<4}>
          {busy?" ":" ENTRAR COMO ESPECTADOR"}
        </button>
      </>)}

      {pickingPlayer&&roomPlayers&&(<>
        <div className="alert al-y" style={{marginBottom:14}}>
           <span>Nombre no encontrado. Eres alguno de estos jugadores o entras como nuevo?</span>
        </div>
        <p className="sec">ELIGE TU JUGADOR (reconectar)</p>
        {roomPlayers.map(p=>(
          <div key={p.id} className="player-pick" onClick={()=>pickPlayer(p)}>
            <div className="ava" style={{background:p.color+"22",color:p.color,width:42,height:42}}>{p.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:"1rem"}}>{p.name}</div>
              <div style={{fontSize:".72rem",color:"rgba(255,255,255,.4)",fontWeight:700}}>{p.total} pts acumulados  {(p.rounds||[]).length} rondas</div>
            </div>
            <div style={{color:"rgba(255,255,255,.3)",fontSize:"1.2rem"}}></div>
          </div>
        ))}
        <div className="div"/>
        <p className="sec">O UNIRME COMO JUGADOR NUEVO</p>
        <input className="inp" placeholder="Nombre del nuevo jugador" value={jname}
          onChange={e=>setJname(e.target.value)} onFocus={()=>snd('tap')}/>
        <button className="btn btn-y" onClick={()=>{snd('tap');joinAsNew();}} disabled={busy||!jname.trim()}>
           AGREGAR JUGADOR NUEVO
        </button>
      </>)}

      <div className="g8"/><button className="btn btn-g" onClick={()=>go("main")}>{T.back}</button>
    </div></div>
  );

  return(
    <div className="wrap"><div className="page" style={{paddingTop:24}}>
      <div className="hero">
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button onClick={()=>{snd('tap');setLang(l=>l==="es"?"en":"es");}} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.6)",borderRadius:9,padding:"5px 10px",cursor:"pointer",fontFamily:"'Righteous',sans-serif",fontSize:".72rem",letterSpacing:1}}>
            {lang==="es"?" English":" Espa\u00F1ol"}
          </button>
        </div>
        <div style={{fontSize:"3.5rem",marginBottom:8}}></div>
        <div className="hero-logo">FLIP 7</div>
        <div className="hero-tag">Race to 200!</div>
        <p style={{color:"rgba(255,255,255,.3)",fontWeight:700,fontSize:".8rem",maxWidth:240,margin:"0 auto"}}>{T.appTag}</p>
      </div>
      <button className="btn btn-y" onClick={()=>go("create")}>{T.createGame}</button>
      <div className="g8"/>
      <button className="btn btn-t" onClick={()=>go("join")}> {T.joinGame}</button>

      {sessions.length>0&&<><div className="div"/><p className="sec">{T.recentSessions}</p><SesCards sessions={sessions} T={T} onClear={()=>{setSessions([]);try{localStorage.removeItem("f7sess")}catch{}}}/></>}
      <div style={{textAlign:"center",marginTop:20,paddingBottom:8}}>
        <span style={{fontFamily:"'Righteous',sans-serif",fontSize:".6rem",color:"rgba(255,255,255,.15)",letterSpacing:2}}>v2.4  FLIP 7</span>
        <button onClick={()=>{localStorage.clear();sessionStorage.clear();window.location.reload();}} style={{display:"block",margin:"6px auto 0",background:"none",border:"none",color:"rgba(255,255,255,.15)",fontFamily:"'Righteous',sans-serif",fontSize:".58rem",cursor:"pointer",letterSpacing:1,textDecoration:"underline"}}>
          {lang==="es"?"Limpiar cach\u00E9":"Clear cache"}
        </button>
      </div>
    </div></div>
  );
}

function ErrBox({err}){
  return(
    <div className="alert al-r">
      <div style={{fontWeight:900}}>{err.msg}</div>
      {err.steps?.length>0&&<ul style={{marginTop:5,paddingLeft:16,fontWeight:700,fontSize:".78rem",opacity:.85}}>{err.steps.map((s,i)=><li key={i}>{s}</li>)}</ul>}
    </div>
  );
}





</script>
<script type="text/babel">





function RoundTab({room,allDone,onSubmit,onUndo,onFinalize,myPlayerId,demoMode,aiConfig,setAiConfig,onRematch,onEndGame,roomCode,T}){

}

<script type="text/babel">








function ScanModal({playerName,onResult,onClose,aiConfig,setAiConfig}){
  const[phase,setPhase]=useState("pick");
  const[img,setImg]=useState(null);
  const[b64,setB64]=useState(null);
  const[mime,setMime]=useState("image/jpeg");
  const[res,setRes]=useState(null);
  const[errMsg,setErrMsg]=useState("");
  const[provider,setProvider]=useState(aiConfig.provider||"gemini");
  
  const getInitialKey=()=>{
    if((aiConfig.provider||"gemini")==="anthropic") return aiConfig.claudeKey||aiConfig.key||"";
    return aiConfig.key||"";
  };
  const[apiKey,setApiKey]=useState(getInitialKey());
  const[showKeyEdit,setShowKeyEdit]=useState(false);
  const[scanMode,setScanMode]=useState("full");
  const fileRef=useRef();

  function handleFile(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const original=ev.target.result;
      
      const img=new Image();
      img.onload=()=>{
        const MAX=1024;
        let w=img.width, h=img.height;
        if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const compressed=canvas.toDataURL('image/jpeg',0.75);
        setImg(compressed);
        setB64(compressed.split(",")[1]);
        setMime("image/jpeg");
        setPhase("preview");
      };
      img.onerror=()=>{ setImg(original); setB64(original.split(",")[1]); setMime(original.split(";")[0].split(":")[1]||"image/jpeg"); setPhase("preview"); };
      img.src=original;
    };
    r.readAsDataURL(f);
  }

  const PROMPT="Mira esta foto de cartas del juego Flip 7.\n\nTu \u00DANICA tarea: lee los n\u00FAmeros que aparecen en las cartas de fondo BLANCO o CREMA.\nLas cartas base tienen escrito el n\u00FAmero en grande y debajo el nombre en ingl\u00E9s (SEVEN, TEN, TWELVE, etc.)\n\nIGNORA completamente:\n- Cualquier carta de fondo AMARILLO o DORADO\n- Cualquier carta de acci\u00F3n (Flip, Freeze, Second Chance)\n- Cualquier s\u00EDmbolo como x2, +2, +4, +6, +8, +10\n\nSOLO reporta los n\u00FAmeros de cartas blancas/crema que veas claramente.\nNOTA IMPORTANTE sobre colores de n\u00FAmeros en cartas base:\n- Carta 7: n\u00FAmero color CAF\u00C9/MARR\u00D3N claro (salmon/beige), texto SEVEN\n- Carta 12: n\u00FAmero color GRIS/CAF\u00C9 oscuro con doble contorno, texto TWELVE\n- Carta 11: n\u00FAmero color AZUL/LILA, texto ELEVEN\n- Carta 10: n\u00FAmero color ROJO brillante, texto TEN\n- Carta 9: n\u00FAmero color NARANJA/MELOCOT\u00D3N, texto NINE\nNO confundas las cartas AMARILLAS/DORADAS de fondo con las cartas base.\n\nResponde \u00DANICAMENTE con este JSON sin markdown:\n{\"cards\":[<lista de n\u00FAmeros enteros que le\u00EDste>],\"total\":<suma de esos n\u00FAmeros>,\"note\":\"<qu\u00E9 cartas viste: ej NINE=9, TEN=10, TWELVE=12>\"}";

  async function analyze(){
    var key=apiKey.trim();
    if(!key){setErrMsg("Ingresa tu API Key arriba.");setPhase("error");return;}
    setAiConfig({provider:provider,key:key});
    setPhase("analyzing");
    var ACTIVE_PROMPT=scanMode==="base_only"
      ? "Mira esta foto de cartas del juego Flip 7. SOLO lee los numeros de las cartas con fondo BLANCO o CREMA. Ignora completamente cualquier carta amarilla. Suma esos numeros. Responde SOLO con JSON sin markdown: {"total":<numero>,"cards":[<lista>],"note":"Solo numeros base"}"
      : PROMPT;
    try{
      var parsed=null;
      if(provider==="gemini"){
        var MODELS=["gemini-2.5-flash","gemini-2.5-flash-lite","gemini-2.5-pro"];
        var lastErr=null;
        var debugLog=[];
        for(var mi=0;mi<MODELS.length;mi++){
          var model=MODELS[mi];
          try{
            var body={
              contents:[{parts:[
                {inline_data:{mime_type:mime,data:b64}},
                {text:ACTIVE_PROMPT}
              ]}]
            };
            var resp=await fetch(
              "https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,
              {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
            );
            var rawBody=await resp.text();
            if(resp.status===429){lastErr=new Error("Cuota excedida (429). Espera 1 minuto.");continue;}
            if(resp.status===404){lastErr=new Error("Modelo "+model+" no disponible (404).");continue;}
            if(resp.status===400){lastErr=new Error("Error 400: "+rawBody.slice(0,200));continue;}
            if(resp.status===403){lastErr=new Error("API Key sin permisos (403).");continue;}
            if(!resp.ok){lastErr=new Error("HTTP "+resp.status+": "+rawBody.slice(0,150));continue;}
            var data=JSON.parse(rawBody);
            if(data.promptFeedback&&data.promptFeedback.blockReason){lastErr=new Error("Bloqueado: "+data.promptFeedback.blockReason);continue;}
            var rawTxt=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||"";
            if(!rawTxt){lastErr=new Error("Respuesta vacia del modelo.");continue;}
            var cleanTxt=rawTxt.replace(/```json/g,"").replace(/```/g,"").trim();
            var jsonStart=cleanTxt.indexOf("{");
            var jsonEnd=cleanTxt.lastIndexOf("}")+1;
            if(jsonStart>=0) cleanTxt=cleanTxt.slice(jsonStart,jsonEnd);
            parsed=JSON.parse(cleanTxt);
            break;
          }catch(ex){lastErr=ex;}
        }
        if(!parsed) throw lastErr||new Error("Todos los modelos de Gemini fallaron.");
      } else {
        var resp2=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mime,data:b64}},
            {type:"text",text:ACTIVE_PROMPT}
          ]}]})
        });
        if(!resp2.ok){var t=await resp2.text();throw new Error("Anthropic "+resp2.status+": "+t.slice(0,120));}
        var data2=await resp2.json();
        var txt2=(data2.content||[]).map(function(c){return c.text||"";}).join("");
        parsed=JSON.parse(txt2.replace(/```json/g,"").replace(/```/g,"").trim());
      }
      snd("score");setRes(parsed);setPhase("result");
    }catch(e){
      var m=e.message||"";
      var friendly=m;
      if(m.includes("429")||m.includes("Cuota")||m.includes("quota"))
        friendly="Cuota de Gemini excedida. Espera ~1 minuto e intenta de nuevo.";
      else if(m.includes("404")||m.includes("not found"))
        friendly="Modelo no encontrado. Se probaron todos los disponibles.";
      else if(m.includes("403")||m.includes("API key"))
        friendly="API Key invalida o sin permisos.";
      else if(m.includes("fetch")||m.includes("network"))
        friendly="Error de red. Verifica tu conexion a internet.";
      setErrMsg(friendly);
      setPhase("error");
    }
  }

  function retake(){setImg(null);setB64(null);setRes(null);setPhase(\"pick\");if(fileRef.current)fileRef.current.value=\"\";}\n\n  return(\n    <div className=\"mbg\"><div className=\"ms\">\n      <div className=\"mh\"/>\n      <div className=\"mt2\">7 Scan con IA</div>\n      <div className=\"msub\">Turno de: <b style={{color:\"#fff\"}}>{playerName}</b></div>\n\n      {phase===\"pick\"&&(<>\n        {}\n        <div style={{background:\"rgba(46,196,182,.08)\",border:\"1px solid rgba(46,196,182,.22)\",borderRadius:12,padding:\"10px 14px\",marginBottom:12,display:\"flex\",alignItems:\"center\",gap:10}}>\n          <span style={{fontSize:\"1.3rem\"}}></span>\n          <div style={{flex:1}}>\n            <div style={{fontWeight:900,fontSize:\".82rem\",color:\"var(--t)\"}}>{apiKey?\" Gemini 2.5 Flash  Activo\":\" Cargando configuraci\u00F3n\"}</div>\n            <div style={{fontSize:\".68rem\",color:\"rgba(255,255,255,.4)\",fontWeight:700}}>{apiKey?\"IA incluida  Lista para usar\":\"La key se carga desde Firebase autom\u00E1ticamente\"}</div>\n          </div>\n          <button onClick={()=>{snd('tap');setShowKeyEdit(v=>!v);}} style={{background:\"none\",border:\"1px solid rgba(255,255,255,.15)\",color:\"rgba(255,255,255,.4)\",borderRadius:8,padding:\"4px 8px\",cursor:\"pointer\",fontSize:\".68rem\",fontWeight:700}}>\n            {showKeyEdit?\"\":\"\"}\n          </button>\n        </div>\n        {showKeyEdit&&(\n          <div className=\"api-box\" style={{marginBottom:12}}>\n            <p>Cambiar IA o key (opcional):</p>\n            <div className=\"ai-tabs\">\n              <button className={"ai-tab ${provider==="gemini"?"on":""}"} onClick={()=>{snd('tap');setProvider(\"gemini\");setApiKey(aiConfig.key||\"\");}}>Gemini<br/><span style={{fontSize:\".6rem\",opacity:.7}}>GRATIS</span></button>\n              <button className={"ai-tab ${provider==="anthropic"?"on":""}"} onClick={()=>{snd('tap');setProvider(\"anthropic\");setApiKey(aiConfig.claudeKey||aiConfig.key||\"\");}}>0 Claude<br/><span style={{fontSize:\".6rem\",opacity:.7}}>$0.001/img</span></button>\n            </div>\n            <input className=\"inp\" style={{margin:0,fontSize:\".82rem\"}} placeholder={provider===\"gemini\"?\"AIzaSy...\":\"sk-ant-api03-...\"} value={apiKey} onChange={e=>setApiKey(e.target.value)} onFocus={()=>snd('tap')}/>\n          </div>\n        )}\n        <input ref={fileRef} type=\"file\" accept=\"image}\n        <div style={{background:\"rgba(46,196,182,.08)\",border:\"1px solid rgba(46,196,182,.2)\",borderRadius:10,padding:\"8px 12px\",marginBottom:8,textAlign:\"center\"}}>\n          <span style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".68rem\",color:\"var(--t)\",letterSpacing:1}}>\n            2 Modo: solo n\u00FAmeros base  Ajusta chips despu\u00E9s del scan\n          </span>\n        </div>\n        <div className=\"mr2\">\n          <button className=\"mc\" onClick={()=>{snd('tap');retake();}}>4 Otra foto</button>\n          <button className=\"mo\" onClick={()=>{snd('tap');analyze();}}>D Analizar</button>\n        </div>\n      </>)}\n\n      {phase===\"analyzing\"&&(\n        <div className=\"cv\" style={{position:\"relative\"}}>\n          <img src={img} alt=\"\" style={{opacity:.4,width:\"100%\",height:\"100%\",objectFit:\"cover\",display:\"block\"}}/>\n          <div className=\"sov\"><div className=\"spin\"/>\n            <div style={{fontFamily:\"'Lilita One',sans-serif\",color:\"var(--y)\",fontSize:\"1rem\"}}>Analizando con {provider===\"gemini\"?\"Gemini \":\"Claude 0\"}</div>\n          </div>\n        </div>\n      )}\n\n      {phase===\"result\"&&res&&(\n        <ResultEditor res={res} onResult={onResult} onRetake={retake}/>\n      )}\n\n      {phase===\"error\"&&(<>\n        <div style={{textAlign:\"center\",padding:\"20px 0\"}}>\n          <div style={{fontSize:\"2.5rem\",marginBottom:10}}>{errMsg.includes(\"Cuota\")?\"\":\"\"}</div>\n          <p style={{fontWeight:800,marginBottom:10,fontSize:\".82rem\",lineHeight:1.5,textAlign:\"left\",whiteSpace:\"pre-wrap\",background:\"rgba(0,0,0,.3)\",padding:\"10px\",borderRadius:10,maxHeight:200,overflowY:\"auto\",wordBreak:\"break-all\"}}>{errMsg}</p>\n          {errMsg.includes(\"Cuota\")&&<div style={{background:\"rgba(245,200,0,.1)\",border:\"1px solid rgba(245,200,0,.25)\",borderRadius:10,padding:\"10px 14px\",fontSize:\".8rem\",fontWeight:800,color:\"var(--y)\"}}>\n            1 Tip: la cuota gratuita es 15 req/min.<br/>Usa  Manual mientras esperas.\n          </div>}\n          {(errMsg.includes(\"404\")||errMsg.includes(\"D\"))&&<div style={{background:\"rgba(46,196,182,.08)\",border:\"1px solid rgba(46,196,182,.2)\",borderRadius:10,padding:\"10px 14px\",fontSize:\".8rem\",fontWeight:800,color:\"var(--t)\"}}>\n            1 Pasos para resolver:<br/>\n            1. Ve a <b>aistudio.google.com</b><br/>\n            2. Claves de API  Elimina la actual  Crea una nueva<br/>\n            3. Abre  en el scan y pega la nueva key\n          </div>}\n        </div>\n        <div className=\"mr2\">\n          <button className=\"mc\" onClick={()=>{snd('tap');onClose();}}>Cerrar</button>\n          <button className=\"mo\" onClick={()=>{snd('tap');retake();}}>4 Reintentar</button>\n        </div>\n      </>)}\n    </div></div>\n  );\n}\nconst CARD_TEXT_MAP={0:\"#FF2FA3\",1:\"#B7A9C9\",2:\"#D8E81B\",3:\"#FF4B78\",4:\"#19C7D8\",5:\"#10C96C\",6:\"#C86AE3\",7:\"#F48A9A\",8:\"#9EDB92\",9:\"#FFA33A\",10:\"#FF3B3B\",11:\"#6EBBFF\",12:\"#B9AEC9\"};\nconst CARD_BG_MAP={0:\"#F6EFD9\",1:\"#F6EFD9\",2:\"#F6EFD9\",3:\"#F6EFD9\",4:\"#F6EFD9\",5:\"#F6EFD9\",6:\"#F6EFD9\",7:\"#F6EFD9\",8:\"#F6EFD9\",9:\"#F6EFD9\",10:\"#F6EFD9\",11:\"#F6EFD9\",12:\"#F6EFD9\"};\nconst MOD_TEXT_COLOR=\"#F25A7A\";\nconst MOD_BG_COLOR=\"#F6A623\";\n\nfunction ResultEditor({res, onResult, onRetake}){\n  \n  const initCards = (res.cards||res.base_cards||[]).map(v=>Number(v)).filter(n=>!isNaN(n)&&n>=0&&n<=12);\n  const[cards,setCards]=React.useState(initCards);\n  const[adding,setAdding]=React.useState(false);\n  const[newVal,setNewVal]=React.useState(\"\");\n  \n  const[multiplier,setMultiplier]=React.useState(res.multiplier||null);\n  const[plusCards,setPlusCards]=React.useState((res.plus_cards||[]).map(Number).filter(n=>n>0));\n\n  const baseTotal = cards.reduce((a,b)=>Number(a)+Number(b),0);\n  const afterMult = multiplier ? baseTotal * multiplier : baseTotal;\n  const total = afterMult + plusCards.reduce((a,b)=>Number(a)+Number(b),0);\n\n  function removeCard(idx){\n    snd('del');\n    setCards(c=>c.filter((_,i)=>i!==idx));\n  }\n\n  function pressNum(d){\n    if(d===\"\"){setNewVal(v=>v.slice(0,-1));snd('del');return;}\n    if(newVal.length>=2)return;\n    snd('num');\n    setNewVal(v=>v+d);\n  }\n\n  function addCard(){\n    const n=parseInt(newVal);\n    if(isNaN(n)||n<0||n>12){snd('del');return;}\n    snd('score');\n    setCards(c=>[...c,n]);\n    setNewVal(\"\");\n    setAdding(false);\n  }\n\n  return(\n    <>\n      {}\n      <div style={{marginBottom:10}}>\n        <div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".65rem\",color:\"rgba(255,255,255,.35)\",letterSpacing:3,marginBottom:8,textAlign:\"center\"}}>\n          CARTAS DETECTADAS  toca  para quitar\n        </div>\n\n        {}\n        <div style={{display:\"flex\",flexWrap:\"wrap\",gap:8,justifyContent:\"center\",minHeight:48,alignItems:\"center\"}}>\n          {cards.length===0&&(\n            <div style={{color:\"rgba(255,255,255,.3)\",fontWeight:700,fontSize:\".85rem\"}}>Sin cartas  agrega manualmente</div>\n          )}\n          {cards.map((n,i)=>(\n            <div key={i} style={{\n              background:CARD_BG_MAP[n]||\"#F6EFD9\",\n              border:\"3px solid rgba(0,0,0,.12)\",\n              borderRadius:10,\n              padding:\"6px 10px\",\n              display:\"flex\",alignItems:\"center\",gap:6,\n              boxShadow:\"0 3px 8px rgba(0,0,0,.4)\",\n              position:\"relative\",\n              minWidth:52,\n  = {baseTotal}</span>\n            )}\n          </div>\n        )}\n        {res.note&&(\n          <div style={{color:\"rgba(255,255,255,.25)\",fontSize:\".68rem\",fontWeight:700,marginTop:5,fontStyle:\"italic\",lineHeight:1.4}}>\n            C {res.note}\n          </div>\n        )}\n      </div>\n\n      {}\n      <div style={{marginBottom:10}}>\n        <div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".62rem\",color:\"rgba(255,255,255,.3)\",letterSpacing:2,marginBottom:6,textAlign:\"center\"}}>\n          MODIFICADORES  toca para aplicar\n        </div>\n        <div style={{display:\"flex\",gap:6,flexWrap:\"wrap\",justifyContent:\"center\",marginBottom:6}}>\n          {}\n          <button onClick={()=>{snd('op');setMultiplier(m=>m?null:2);}}\n            style={{border:"2px solid ${multiplier===2?MOD_TEXT_COLOR:"rgba(242,90,122,.3)"}",background:multiplier===2?MOD_BG_COLOR:\"rgba(246,166,35,.1)\",borderRadius:10,padding:\"8px 14px\",cursor:\"pointer\",fontFamily:\"'Anton',sans-serif\",fontSize:\"1.2rem\",color:multiplier===2?\"#fff\":MOD_TEXT_COLOR,transition:\"all .2s\",minWidth:56,textAlign:\"center\"}}>\n            \u00D72\n            {multiplier===2&&<div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".55rem\",color:\"#fff\",letterSpacing:1,marginTop:1}}>ACTIVO</div>}\n          </button>\n          {}\n          {[2,4,6,8,10].map(n=>{\n            const active=plusCards.includes(n);\n            return(\n              <button key={n} onClick={()=>{snd('op');setPlusCards(p=>active?p.filter(x=>x!==n):[...p,n]);}}\n                style={{border:"2px solid ${active?MOD_TEXT_COLOR:"rgba(242,90,122,.25)"}",background:active?MOD_BG_COLOR:\"rgba(246,166,35,.08)\",borderRadius:10,padding:\"8px 12px\",cursor:\"pointer\",fontFamily:\"'Anton',sans-serif\",fontSize:\"1.1rem\",color:active?\"#fff\":MOD_TEXT_COLOR,transition:\"all .2s\",minWidth:48,textAlign:\"center\"}}>\n                +{n}\n                {active&&<div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".55rem\",color:\"#fff\",letterSpacing:1,marginTop:1}}></div>}\n              </button>\n            );\n          })}\n        </div>\n        {(multiplier||plusCards.length>0)&&(\n          <div style={{background:\"rgba(246,166,35,.15)\",border:\"1px solid rgba(246,166,35,.4)\",borderRadius:9,padding:\"6px 12px\",textAlign:\"center\",fontSize:\".76rem\",fontWeight:800,color:\"var(--y)\"}}>\n            {multiplier?\"\u00D72 activado: \":\"\"}\n            {multiplier?"(${baseTotal}) x2 = ${baseTotal*2}":"base = ${baseTotal}"}\n            {plusCards.length>0?" + ${plusCards.join("+")} = ${multiplier?baseTotal*2+plusCards.reduce((a,b)=>a+b,0):baseTotal+plusCards.reduce((a,b)=>a+b,0)}":\"\"}\n          </div>\n        )}\n      </div>\n\n      {}\n      {!adding?(\n        <button onClick={()=>{snd('tap');setAdding(true);setNewVal(\"\");}}\n          style={{width:\"100%\",background:\"rgba(255,255,255,.06)\",border:\"2px dashed rgba(255,255,255,.2)\",borderRadius:12,padding:\"10px\",cursor:\"pointer\",fontFamily:\"'Righteous',sans-serif\",fontSize:\".78rem\",color:\"rgba(255,255,255,.5)\",letterSpacing:1,marginBottom:12}}>\n           AGREGAR CARTA BASE (012)\n        </button>\n      ):(\n        <div style={{background:\"rgba(255,255,255,.05)\",border:\"1px solid rgba(255,255,255,.12)\",borderRadius:12,padding:\"12px\",marginBottom:12}}>\n          <div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".62rem\",color:\"rgba(255,255,255,.35)\",letterSpacing:2,marginBottom:8,textAlign:\"center\"}}>QU\u00C9 N\u00DAMERO? (012)</div>\n          <div style={{fontFamily:\"'Anton',sans-serif\",fontSize:\"3rem\",color:\"var(--t)\",textAlign:\"center\",marginBottom:8,lineHeight:1}}>\n            {newVal||\"_\"}\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:6,marginBottom:6}}>\n            {[\"7\",\"8\",\"9\",\"4\",\"5\",\"6\",\"1\",\"2\",\"3\"].map(d=>(\n              <button key={d} className=\"npb\" style={{padding:\"12px 4px\",fontSize:\"1.1rem\"}} onClick={()=>pressNum(d)}>{d}</button>\n            ))}\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"2fr 1fr\",gap:6,marginBottom:8}}>\n            <button className=\"npb zero-key\" style={{padding:\"12px 4px\",fontSize:\"1.1rem\"}} onClick={()=>pressNum(\"0\")}>0</button>\n            <button className=\"npb del-key\" style={{padding:\"12px 4px\"}} onClick={()=>pressNum(\"\")}></button>\n          </div>\n          <div className=\"mr2\">\n            <button className=\"mc\" onClick={()=>{snd('tap');setAdding(false);}}>Cancelar</button>\n            <button className=\"mo\" onClick={addCard} disabled={!newVal}>\n               Agregar {newVal?"carta ${newVal}":\"\"}\n            </button>\n          </div>\n        </div>\n      )}\n\n      {}\n      <div className=\"mr2\">\n        <button className=\"mc\" onClick={()=>{snd('tap');onRetake();}}>4 Repetir foto</button>\n        <button className=\"mo\" onClick={()=>{snd('score');onResult(total);}}\n          disabled={cards.length===0}>\n           Confirmar {total} pts\n        </button>\n      </div>\n    </>\n  );\n}\nfunction ManualModal({playerName,onSubmit,onClose}){\n  const[expr,setExpr]=useState(\"\");\n  const[calcResult,setCalcResult]=useState(0);\n  const[error,setError]=useState(false);\n\n  function pressNum(d){\n    snd('num');\n    setExpr(v=>v+d);\n  }\n  function pressOp(op){\n    snd('op');\n    setExpr(v=>{\n      if(!v)return v;\n      const last=v.slice(-1);\n      if(['+','-','*','/'].includes(last))return v.slice(0,-1)+op;\n      return v+op;\n    });\n  }\n  function pressDel(){\n    snd('del');\n    setExpr(v=>v.slice(0,-1));\n  }\n  function pressClear(){\n    snd('del');setExpr(\"\");setCalcResult(0);setError(false);\n  }\n\n  useEffect(()=>{\n    if(!expr){setCalcResult(0);setError(false);return;}\n    const r=safeEval(expr);\n    if(r===null){setError(true);}\n    else{setError(false);setCalcResult(r);}\n  },[expr]);\n\n  const display=expr||\"0\";\n  const finalVal=error?0:calcResult;\n\n  return(\n    <div className=\"mbg\"><div className=\"ms\">\n      <div className=\"mh\"/>\n      <div className=\"mt2\">E Captura Manual</div>\n      <div className=\"msub\">Puntos de <b style={{color:\"#fff\"}}>{playerName}</b> esta ronda</div>\n\n      {}\n      <div className=\"calc-display\">\n        <div className=\"calc-expr\">{display}</div>\n        <div className={"calc-result ${error?"error":""}"}>\n          {error?\"ERROR\":finalVal}\n        </div>\n      </div>\n\n      {}\n      <div className=\"np-grid\">\n        {[\"7\",\"8\",\"9\",\"4\",\"5\",\"6\",\"1\",\"2\",\"3\"].map(d=>(\n          <button key={d} className=\"npb\" onClick={()=>pressNum(d)}>{d}</button>\n        ))}\n      </div>\n\n      {}\n      <div className=\"np-bottom\">\n        <button className=\"npb zero-key\" onClick={()=>pressNum('0')}>0</button>\n        <button className=\"npb del-key\" onClick={pressDel}></button>\n      </div>\n\n      {}\n      <div className=\"np-ops\">\n        <button className=\"npb op-key\" onClick={()=>pressOp('+')}>+</button>\n        <button className=\"npb op-key\" onClick={()=>pressOp('-')}></button>\n        <button className=\"npb op-key\" onClick={()=>pressOp('*')}>\u00D7</button>\n        <button className=\"npb clr-key\" onClick={pressClear}>CLR</button>\n      </div>\n\n      {}\n      <button className=\"npb ok-key\" onClick={()=>{\n        if(error||(!expr&&finalVal===0)){snd('zero');onSubmit(0);}\n        else{snd('score');onSubmit(Math.max(0,Math.round(finalVal)));}\n      }}>\n         CONFIRMAR  <span style={{fontSize:\"1.4rem\"}}>{error?\"0\":Math.max(0,Math.round(finalVal))}</span> puntos\n      </button>\n      <div style={{height:10}}/>\n      <button className=\"mc\" style={{width:\"100%\"}} onClick={()=>{snd('tap');onClose();}}>Cancelar</button>\n    </div></div>\n  );\n}\nfunction WinnerScreen({winner,onClose,onNew,T}){\n  React.useEffect(()=>{ setTimeout(()=>snd('victory'),300); },[]);\n  const isTie=winner?.tied;\n  const dots=Array.from({length:40},(_,i)=>({id:i,c:CONF[i%CONF.length],l:"${Math.random()*100}%",dl:"${Math.random()*2.5}s",dr:"${2.5+Math.random()*2.5}s",sz:"${7+Math.random()*10}px",sh:Math.random()>.5?\"2px\":\"50%\"}));\n  return(\n    <div className=\"wb\">\n      {dots.map(d=><div key={d.id} style={{position:\"absolute\",background:d.c,width:d.sz,height:d.sz,left:d.l,top:-20,borderRadius:d.sh,animation:"cf ${d.dr} ${d.dl} linear infinite"}}/>)}\n      <div className=\"wc\">{isTie?\"D\":\"F\"}</div>\n      <div className=\"wl\">{isTie?\"EMPATE!\":{T.winner2}}</div>\n      <div className=\"wbig\">FLIP 7</div>\n      {isTie?(\n        <>\n          <div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".85rem\",color:\"var(--t)\",letterSpacing:3,marginBottom:8}}>\n            {winner.players.length} GANADORES\n          </div>\n          {winner.players.map(p=>(\n            <div key={p.id} style={{fontFamily:\"'Lilita One',sans-serif\",fontSize:\"2rem\",color:\"white\",letterSpacing:1,marginBottom:4,textShadow:\"0 0 20px rgba(245,200,0,.4)\"}}>\n              {p.emoji} {p.name}\n            </div>\n          ))}\n          <div style={{fontFamily:\"'Righteous',sans-serif\",fontSize:\".9rem\",color:\"var(--y)\",marginBottom:30,letterSpacing:2,marginTop:6}}>\n            {winner.total} PUNTOS CADA UNO\n          </div>\n        </>\n      ):(\n        <>\n          <div className=\"wnm\">{winner.emoji} {winner.name}</div>\n          <div className=\"wpt\">{winner.total} PUNTOS  RACE TO 200!</div>\n        </>\n      )}\n      <button className=\"btn btn-y\" onClick={()=>{snd('tap');onNew();}} style={{maxWidth:270,marginBottom:10}}>E NUEVO JUEGO</button>\n      <button className=\"btn btn-g\" onClick={()=>{snd('tap');onClose();}} style={{maxWidth:270}}>Ver marcador final</button>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById(
